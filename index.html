<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSYX-MANGA | Boutique & Scans Haïti</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;1,600&family=Barlow:wght@300;400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>

    <nav id="nav">
        <div class="nav-logo">PSYX<span>MANGA</span></div>
        <div class="nav-mid">
            <input type="text" id="searchInput" placeholder="Rechercher un manga...">
        </div>
        <div class="nav-right">
            <div id="authSection">
                <button class="btn-sec" onclick="openAuthModal()">Connexion</button>
            </div>
            <button class="btn-cart">🛒 <span class="badge" id="cartCount">0</span></button>
        </div>
    </nav>

    <section id="hero">
        <div class="hero-glow"></div>
        <div class="hero-content">
            <span class="hero-badge">DISPONIBLE EN HAÏTI</span>
            <h1>LECTURE <span>ILLIMITÉE</span></h1>
            <p class="slogan">Mangas, Figurines & Posters au meilleur prix.</p>
            <div class="hero-btns">
                <button class="btn-primary" onclick="scrollToShop()">VOIR LA BOUTIQUE</button>
                <button class="btn-sec">LIRE LES SCANS</button>
            </div>
        </div>
        <div class="hero-deco">MANGA</div>
    </section>

    <section class="section">
        <h2 class="sec-title">DERNIÈRES <span>SORTIES</span></h2>
        <div id="mangaGrid" class="grid">
            <p class="empty">Chargement des mangas...</p>
        </div>
    </section>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
